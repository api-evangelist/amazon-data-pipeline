apis:
- name: AWS Data Pipeline API
  description: >-
    The AWS Data Pipeline API provides a web service for processing and moving
    data between different AWS compute and storage services as well as
    on-premises data sources at specified intervals. The API allows you to create
    pipeline definitions, schedule data transformations, set up retry and failure
    handling logic, and monitor pipeline execution. It supports data-driven
    workflows that can access data from Amazon S3, Amazon RDS, Amazon DynamoDB,
    and Amazon EMR.
